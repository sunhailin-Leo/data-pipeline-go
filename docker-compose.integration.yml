services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "integration-test-cluster-id"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: integration_test
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p testpass"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: integration_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d integration_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: testpass
      CLICKHOUSE_DB: integration_test
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: testuser
      RABBITMQ_DEFAULT_PASS: testpass
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    environment:
      HEAP_OPTS: "-Xms256m -Xmx256m -Xmn128m"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9876' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    ports:
      - "10911:10911"
      - "10909:10909"
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    command: sh mqbroker -n rocketmq-namesrv:9876 --enable-proxy
    environment:
      HEAP_OPTS: "-Xms512m -Xmx512m -Xmn256m"
      NAMESRV_ADDR: rocketmq-namesrv:9876
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/10911' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  pulsar:
    image: apachepulsar/pulsar:3.3.4
    ports:
      - "6650:6650"
      - "8080:8080"
    command: bin/pulsar standalone
    environment:
      PULSAR_MEM: "-Xms256m -Xmx256m"
    healthcheck:
      test: ["CMD-SHELL", "bin/pulsar-admin brokers healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  elasticsearch:
    image: elasticsearch:7.17.27
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
      ELASTIC_PASSWORD: testpass
      xpack.security.enabled: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:testpass http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
