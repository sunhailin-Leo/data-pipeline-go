name: Integration Test

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'docker-compose.integration.yml'
      - '.github/workflows/integration-test.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'docker-compose.integration.yml'
      - '.github/workflows/integration-test.yml'

permissions:
  contents: read

jobs:
  integration-test-linux:
    name: Integration Test (Linux)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      kafka:
        image: apache/kafka:latest
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          CLUSTER_ID: integration-test-cluster-id
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: integration_test
        options: >-
          --health-cmd "mysqladmin ping -h localhost -ptestpass"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 20s

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: integration_test
        options: >-
          --health-cmd "pg_isready -U testuser -d integration_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: testpass
          CLICKHOUSE_DB: integration_test
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s

      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: testuser
          RABBITMQ_DEFAULT_PASS: testpass
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 15s

      rocketmq-namesrv:
        image: apache/rocketmq:5.3.1
        ports:
          - 9876:9876
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/9876' || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 15s
        env:
          HEAP_OPTS: "-Xms256m -Xmx256m -Xmn128m"

      rocketmq-broker:
        image: apache/rocketmq:5.3.1
        ports:
          - 10911:10911
          - 10909:10909
        env:
          HEAP_OPTS: "-Xms512m -Xmx512m -Xmn256m"
          NAMESRV_ADDR: rocketmq-namesrv:9876
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/10911' || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
          --health-start-period 30s

      pulsar:
        image: apachepulsar/pulsar:3.3.4
        ports:
          - 6650:6650
          - 8080:8080
        env:
          PULSAR_MEM: "-Xms256m -Xmx256m"
        options: >-
          --health-cmd "bin/pulsar-admin brokers healthcheck || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 30s

      elasticsearch:
        image: elasticsearch:7.17.27
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          ES_JAVA_OPTS: "-Xms256m -Xmx256m"
          ELASTIC_PASSWORD: testpass
          xpack.security.enabled: "true"
        options: >-
          --health-cmd "curl -s -u elastic:testpass http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 30s

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        env:
          INTEGRATION_TEST: "true"
          INTEGRATION_REDIS_ADDR: localhost:6379
          INTEGRATION_KAFKA_ADDR: localhost:9092
          INTEGRATION_MYSQL_ADDR: localhost:3306
          INTEGRATION_MYSQL_USER: root
          INTEGRATION_MYSQL_PASS: testpass
          INTEGRATION_MYSQL_DB: integration_test
          INTEGRATION_POSTGRES_ADDR: localhost:5432
          INTEGRATION_POSTGRES_USER: testuser
          INTEGRATION_POSTGRES_PASS: testpass
          INTEGRATION_POSTGRES_DB: integration_test
          INTEGRATION_CLICKHOUSE_ADDR: localhost:9000
          INTEGRATION_CLICKHOUSE_USER: default
          INTEGRATION_CLICKHOUSE_PASS: testpass
          INTEGRATION_CLICKHOUSE_DB: integration_test
          INTEGRATION_RABBITMQ_ADDR: localhost:5672
          INTEGRATION_RABBITMQ_USER: testuser
          INTEGRATION_RABBITMQ_PASS: testpass
          INTEGRATION_ROCKETMQ_ADDR: 127.0.0.1:9876
          INTEGRATION_PULSAR_ADDR: localhost:6650
          INTEGRATION_ES_ADDR: http://localhost:9200
          INTEGRATION_ES_USER: elastic
          INTEGRATION_ES_PASS: testpass
        run: go test -v -race -timeout 180s ./pkg/sink/... ./pkg/source/...

  integration-test-macos:
    name: Integration Test (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install Docker
        run: |
          brew install docker docker-compose colima
          colima start --cpu 2 --memory 4

      - name: Start services
        run: docker compose -f docker-compose.integration.yml up -d --wait --wait-timeout 120

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        env:
          INTEGRATION_TEST: "true"
          INTEGRATION_REDIS_ADDR: localhost:6379
          INTEGRATION_KAFKA_ADDR: localhost:9092
          INTEGRATION_MYSQL_ADDR: localhost:3306
          INTEGRATION_MYSQL_USER: root
          INTEGRATION_MYSQL_PASS: testpass
          INTEGRATION_MYSQL_DB: integration_test
          INTEGRATION_POSTGRES_ADDR: localhost:5432
          INTEGRATION_POSTGRES_USER: testuser
          INTEGRATION_POSTGRES_PASS: testpass
          INTEGRATION_POSTGRES_DB: integration_test
          INTEGRATION_CLICKHOUSE_ADDR: localhost:9000
          INTEGRATION_CLICKHOUSE_USER: default
          INTEGRATION_CLICKHOUSE_PASS: testpass
          INTEGRATION_CLICKHOUSE_DB: integration_test
          INTEGRATION_RABBITMQ_ADDR: localhost:5672
          INTEGRATION_RABBITMQ_USER: testuser
          INTEGRATION_RABBITMQ_PASS: testpass
          INTEGRATION_ROCKETMQ_ADDR: 127.0.0.1:9876
          INTEGRATION_PULSAR_ADDR: localhost:6650
          INTEGRATION_ES_ADDR: http://localhost:9200
          INTEGRATION_ES_USER: elastic
          INTEGRATION_ES_PASS: testpass
        run: go test -v -race -timeout 180s ./pkg/sink/... ./pkg/source/...

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v

  integration-test-windows:
    name: Integration Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Start Docker services
        shell: bash
        run: docker compose -f docker-compose.integration.yml up -d --wait --wait-timeout 120

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        shell: bash
        env:
          INTEGRATION_TEST: "true"
          INTEGRATION_REDIS_ADDR: localhost:6379
          INTEGRATION_KAFKA_ADDR: localhost:9092
          INTEGRATION_MYSQL_ADDR: localhost:3306
          INTEGRATION_MYSQL_USER: root
          INTEGRATION_MYSQL_PASS: testpass
          INTEGRATION_MYSQL_DB: integration_test
          INTEGRATION_POSTGRES_ADDR: localhost:5432
          INTEGRATION_POSTGRES_USER: testuser
          INTEGRATION_POSTGRES_PASS: testpass
          INTEGRATION_POSTGRES_DB: integration_test
          INTEGRATION_CLICKHOUSE_ADDR: localhost:9000
          INTEGRATION_CLICKHOUSE_USER: default
          INTEGRATION_CLICKHOUSE_PASS: testpass
          INTEGRATION_CLICKHOUSE_DB: integration_test
          INTEGRATION_RABBITMQ_ADDR: localhost:5672
          INTEGRATION_RABBITMQ_USER: testuser
          INTEGRATION_RABBITMQ_PASS: testpass
          INTEGRATION_ROCKETMQ_ADDR: 127.0.0.1:9876
          INTEGRATION_PULSAR_ADDR: localhost:6650
          INTEGRATION_ES_ADDR: http://localhost:9200
          INTEGRATION_ES_USER: elastic
          INTEGRATION_ES_PASS: testpass
        run: go test -v -race -timeout 180s ./pkg/sink/... ./pkg/source/...

      - name: Stop services
        if: always()
        shell: bash
        run: docker compose -f docker-compose.integration.yml down -v
