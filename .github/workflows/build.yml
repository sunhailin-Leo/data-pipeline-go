name: Build

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/build.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: windows
            arch: amd64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Determine CGO setting
        id: cgo
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "linux" ] && [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "enabled=1" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.os }}" = "darwin" ]; then
            echo "enabled=1" >> $GITHUB_OUTPUT
          else
            echo "enabled=0" >> $GITHUB_OUTPUT
          fi

      - name: Build (Unix)
        if: matrix.os != 'windows'
        env:
          CGO_ENABLED: ${{ steps.cgo.outputs.enabled }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          cd cmd
          go build -o data-pipeline-go .

      - name: Build (Windows)
        if: matrix.os == 'windows'
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
        run: |
          cd cmd
          go build -o data-pipeline-go.exe .
