version: "2"

run:
  go: "1.25.8"
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - gocritic
    - misspell
    - nolintlint
    - prealloc
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    govet:
      enable:
        - shadow
    misspell:
      locale: US
    errcheck:
      exclude-functions:
        - (fmt.*).*
  exclusions:
    paths:
      - vendor
      - .idea
      - docs
      - .github
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true
