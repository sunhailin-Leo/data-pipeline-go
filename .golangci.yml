version: "2"

run:
  timeout: 5m
  go: "1.25.8"
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - bodyclose
    - gocritic
    - gofmt
    - goimports
    - misspell
    - nolintlint
    - prealloc

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  govet:
    enable-shadow: true
  misspell:
    locale: US
  errcheck:
    exclude-functions:
      - (fmt.*).*

issues:
  exclude-dirs:
    - vendor
    - .idea
    - docs
    - .github
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10

output:
  formats:
    colored-line-number: {}
  print-issued-lines: true
  print-linter-name: true
